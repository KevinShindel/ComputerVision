name: Cleanup Old Workflow Runs

on:
  schedule:
    # Run every Monday at 3:00 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Fetching all workflow runs for ${owner}/${repo}...`);
            
            let page = 1;
            let allRuns = [];
            let hasMore = true;
            
            // Fetch all workflow runs (paginated)
            while (hasMore) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: owner,
                repo: repo,
                per_page: 100,
                page: page
              });
              
              allRuns = allRuns.concat(response.data.workflow_runs);
              hasMore = response.data.workflow_runs.length === 100;
              page++;
            }
            
            console.log(`Total workflow runs found: ${allRuns.length}`);
            
            // Group runs by workflow name
            const workflowMap = {};
            allRuns.forEach(run => {
              const workflowName = run.name;
              if (!workflowMap[workflowName]) {
                workflowMap[workflowName] = [];
              }
              workflowMap[workflowName].push(run);
            });
            
            // For each workflow, keep only the last 10 runs, delete the rest
            let deletedCount = 0;
            
            for (const workflowName in workflowMap) {
              const workflowRuns = workflowMap[workflowName].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              
              console.log(`\n📋 Workflow: "${workflowName}"`);
              console.log(`   Total runs: ${workflowRuns.length}`);
              
              if (workflowRuns.length > 10) {
                const runsToDelete = workflowRuns.slice(10);
                console.log(`   Deleting ${runsToDelete.length} old runs...`);
                
                for (const run of runsToDelete) {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner: owner,
                      repo: repo,
                      run_id: run.id
                    });
                    console.log(`   ✓ Deleted run #${run.id} (${run.created_at})`);
                    deletedCount++;
                  } catch (error) {
                    console.log(`   ✗ Failed to delete run #${run.id}: ${error.message}`);
                  }
                }
              } else {
                console.log(`   ✓ Keeping all ${workflowRuns.length} runs (≤ 10)`);
              }
            }
            
            console.log(`\n✅ Cleanup completed! Deleted ${deletedCount} runs.`);